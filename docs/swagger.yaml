definitions:
  api.BusinessError:
    properties:
      code:
        description: Code error code, 0 indicates success, otherwise business error
          (e.g. user not found) or internal server error.
        type: integer
      data:
        description: Data is the return value if success. Otherwise, it is concret
          failure reason in string type.
      message:
        description: Message error message associated with `Code`.
        type: string
    type: object
  api.GasTankPrepareDepositRequest:
    properties:
      amount:
        description: Amount of tokens to deposit for gas fee payment.
        type: string
      token:
        description: ERC20 token address to deposit for gas fee payment.
        type: string
    required:
    - amount
    - token
    type: object
  api.GasTankPrepareRequest:
    properties:
      sender:
        description: Smart account address in hex format with 0x prefix.
        type: string
      token:
        description: ERC20 token address to pay gas fee.
        type: string
    required:
    - sender
    - token
    type: object
  api.SetCodeAuth:
    properties:
      chainId:
        description: ChainID is the chain ID the authorization is bound to. 0 means
          the auth is valid on any chain.
        type: integer
      contract:
        description: |-
          Contract is the 20-byte hex address (with 0x prefix) of the smart-contract to delegate the EOA to.
          Set to "0x0000000000000000000000000000000000000000" to revoke an existing delegation.
        type: string
      nonce:
        description: Nonce is the current on-chain nonce of the signing authority
          (EOA). Must match exactly.
        type: integer
      r:
        description: R is the R component of the EIP-7702 authorization signature,
          as a 0x-prefixed hex string.
        type: string
      s:
        description: S is the S component of the EIP-7702 authorization signature,
          as a 0x-prefixed hex string.
        type: string
      v:
        description: V is the recovery identifier of the EIP-7702 authorization signature
          (0 or 1).
        type: integer
    required:
    - contract
    - r
    - s
    type: object
  api.SetCodeResult:
    properties:
      error:
        description: Error contains the failure reason reported by the EVM when Success
          is false.
        type: string
      executed:
        description: Executed indicates whether the transaction has been executed.
        type: boolean
      success:
        description: Success indicates whether the set-code authorization succeeded.
          Only meaningful when Executed is true.
        type: boolean
    type: object
  api.UserOperation:
    properties:
      callData:
        type: string
      callGasLimit:
        maxLength: 34
        minLength: 4
        type: string
      maxFeePerGas:
        maxLength: 34
        minLength: 4
        type: string
      maxPriorityFeePerGas:
        maxLength: 34
        minLength: 4
        type: string
      nonce:
        minLength: 4
        type: string
      paymaster:
        description: Paymaster
        type: string
      paymasterData:
        description: at least validAfter (6) || validUntil (6) || signature (65)
        minLength: 156
        type: string
      paymasterPostOpGasLimit:
        maxLength: 34
        minLength: 4
        type: string
      paymasterVerificationGasLimit:
        maxLength: 34
        minLength: 4
        type: string
      preVerificationGas:
        maxLength: 34
        minLength: 4
        type: string
      sender:
        type: string
      signature:
        type: string
      verificationGasLimit:
        maxLength: 34
        minLength: 4
        type: string
    type: object
info:
  contact: {}
paths:
  /aa/auth:
    post:
      consumes:
      - application/json
      description: |-
        Validates the signed EIP-7702 authorization and broadcasts a set-code transaction.
        The service will sponsor the set-code transaction gas fee, and user needs to poll GET /aa/auth/{txHash} for the result.
      operationId: aaAuthSend
      parameters:
      - description: Signed EIP-7702 authorization message
        in: body
        name: auth
        required: true
        schema:
          $ref: '#/definitions/api.SetCodeAuth'
      produces:
      - application/json
      responses:
        "200":
          description: Transaction hash (0x-prefixed hex)
          schema:
            allOf:
            - $ref: '#/definitions/api.BusinessError'
            - properties:
                data:
                  type: string
              type: object
        "600":
          description: Internal server error
          schema:
            allOf:
            - $ref: '#/definitions/api.BusinessError'
            - properties:
                data:
                  type: string
              type: object
      summary: Submit EIP-7702 authorization
      tags:
      - AccountAbstract
  /aa/auth/{txHash}:
    get:
      consumes:
      - application/json
      description: |-
        Returns the executed result of an EIP-7702 set-code transaction. Returns executed=false while the transaction is still pending.
        If the transaction is not found (business error code 1001), re-submit via POST /aa/auth.
      operationId: aaAuthStatus
      parameters:
      - description: 0x-prefixed 32-byte transaction hash (66 characters)
        in: path
        name: txHash
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Set-code result (check executed and success fields)
          schema:
            allOf:
            - $ref: '#/definitions/api.BusinessError'
            - properties:
                data:
                  $ref: '#/definitions/api.SetCodeResult'
              type: object
        "600":
          description: Internal server error
          schema:
            allOf:
            - $ref: '#/definitions/api.BusinessError'
            - properties:
                data:
                  type: string
              type: object
      summary: Query EIP-7702 set-code result
      tags:
      - AccountAbstract
  /aa/gastank/prepare:
    get:
      consumes:
      - application/json
      description: Returns paymasterData used to estimate gas for a normal UserOperation
        in REFUND mode.
      operationId: aaGasTankPrepare
      parameters:
      - description: Paymaster data request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.GasTankPrepareRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Paymaster and data (0x-prefixed hex)
          schema:
            allOf:
            - $ref: '#/definitions/api.BusinessError'
            - properties:
                data:
                  type: string
              type: object
        "600":
          description: Internal server error
          schema:
            allOf:
            - $ref: '#/definitions/api.BusinessError'
            - properties:
                data:
                  type: string
              type: object
      summary: Prepare paymasterData for REFUND mode estimation
      tags:
      - GasTank
  /aa/gastank/prepare/deposit:
    get:
      consumes:
      - application/json
      description: Returns paymasterData used to estimate UserOperation gas in CREDIT
        mode for token deposit flow.
      operationId: aaGasTankPrepareDeposit
      parameters:
      - description: Paymaster data request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.GasTankPrepareDepositRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Paymaster and data (0x-prefixed hex)
          schema:
            allOf:
            - $ref: '#/definitions/api.BusinessError'
            - properties:
                data:
                  type: string
              type: object
        "600":
          description: Internal server error
          schema:
            allOf:
            - $ref: '#/definitions/api.BusinessError'
            - properties:
                data:
                  type: string
              type: object
      summary: Prepare paymasterData for CREDIT mode deposit estimation
      tags:
      - GasTank
  /aa/gastank/sign:
    post:
      consumes:
      - application/json
      description: Calculates maxTokenCost for the given UserOperation, adds paymaster
        signature, and returns reassembled paymasterData.
      operationId: aaGasTankSign
      parameters:
      - description: UserOperation for maxTokenCost estimation and paymaster signing
        in: body
        name: userOp
        required: true
        schema:
          $ref: '#/definitions/api.UserOperation'
      produces:
      - application/json
      responses:
        "200":
          description: Signed and reassembled paymasterData (0x-prefixed hex)
          schema:
            allOf:
            - $ref: '#/definitions/api.BusinessError'
            - properties:
                data:
                  type: string
              type: object
        "600":
          description: Internal server error
          schema:
            allOf:
            - $ref: '#/definitions/api.BusinessError'
            - properties:
                data:
                  type: string
              type: object
      summary: Sign paymasterData for UserOperation
      tags:
      - GasTank
swagger: "2.0"
